<body data-layer="loading" class="dark">
  <main>
    <div id="intro" class="layer">
      <header>
        <a class="spiral-stamp" href="https://thecreativeindependent.com/">
          <img src="/images/logo-spiral.svg" alt="" />
        </a>
      </header>

      <p>Welcome to TCI Quotes, a place to explore inspiring words from 2433 creative people.</p>

      <button id="start-button">Start</button>

      <video playsinline autoplay loop muted class="video-background"
        src="https://s3.amazonaws.com/tci-assets/home-videos/salad-and-garden-snail-2017.mp4"></video>
    </div>

    <div id="quote" class="layer">
      <header>
        <a class="spiral-stamp" href="https://thecreativeindependent.com/">
          <img src="/images/logo-spiral.svg" alt="" />
        </a>
        <div id="quote-title--container">
          <a id="quote-title"></a>
        </div>
        <div>
          <a id="quote-share-link">Share</a>
        </div>
      </header>

      <figure>
        <blockquote id="quote-text" lang="en"></blockquote>
      </figure>
    </div>

    <div id="snail" class="layer">
      <video playsinline autoplay loop muted class="video-background"
        src="https://s3.amazonaws.com/tci-assets/home-videos/salad-and-garden-snail-2017.mp4"></video>
    </div>

    <div id="loading" class="layer">
    </div>

    <div id="buttons">
      <button id="quote-button"></button>
      <button id="snail-button">
        <video playsinline autoplay loop muted
          src="https://tci-assets.s3.amazonaws.com/home-videos/crop/tci-snail-october-2018_CROP.m4v"></video>
      </button>
      <button id="dark-mode-button"></button>
    </div>
  </main>
